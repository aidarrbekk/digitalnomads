{% extends "base.html" %}
{% block title %}{{ t('pharmacy') }} - ShipAI{% endblock %}
{% block content %}
<div class="py-4 fade-in">
    <h1 class="section-title">{{ t('find_meds') }}</h1>
    <p class="section-subtitle">
        {{ t('total_medications_label') }}
        <strong class="text-accent">{{ total_medications }}</strong>
        {{ t('total_medications') }}
    </p>

    <!-- Search Filters Panel -->
    <div class="card no-hover mb-4 navbar-hide-trigger">
        <div class="card-body">
            <h6 class="fw-bold mb-3"><i class="bi bi-funnel me-2"></i>{{ t('search_filters') }}</h6>
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label small text-muted">{{ t('medication_name_label') }}</label>
                    <input type="text" class="form-control" id="searchInput" placeholder="{{ t('search_meds') }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label small text-muted">{{ t('city_filter_label') }}</label>
                    <select class="form-select" id="cityFilter">
                        <option value="">{{ t('all_cities') }}</option>
                        {% for city in cities %}
                        <option value="{{ city.value }}">{% if current_lang == 'ru' and city.name_ru %}{{ city.name_ru }}{% elif current_lang == 'kz' and city.name_kz %}{{ city.name_kz }}{% else %}{{ city.name }}{% endif %}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label small text-muted">{{ t('category_filter_label') }}</label>
                    <select class="form-select" id="categoryFilter">
                        <option value="">{{ t('all_categories') }}</option>
                        {% for cat in categories %}
                        <option value="{{ cat.id }}">{% if current_lang == 'ru' and cat.name_ru %}{{ cat.name_ru }}{% elif current_lang == 'kz' and cat.name_kz %}{{ cat.name_kz }}{% else %}{{ cat.name }}{% endif %}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label small text-muted">{{ t('pharmacy_filter_label') }}</label>
                    <select class="form-select" id="pharmacyFilter">
                        <option value="">{{ t('all_pharmacies') }}</option>
                        {% for pharm in pharmacies %}
                        <option value="{{ pharm.id }}">{% if current_lang == 'ru' and pharm.name_ru %}{{ pharm.name_ru }}{% elif current_lang == 'kz' and pharm.name_kz %}{{ pharm.name_kz }}{% else %}{{ pharm.name }}{% endif %}{% if pharm.city %} — {% if current_lang == 'ru' and pharm.city_ru %}{{ pharm.city_ru }}{% elif current_lang == 'kz' and pharm.city_kz %}{{ pharm.city_kz }}{% else %}{{ pharm.city }}{% endif %}{% endif %}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-12 d-flex gap-2 mt-2">
                    <button class="btn btn-primary" id="searchBtn"><i class="bi bi-search me-1"></i>{{ t('apply_filters') }}</button>
                    <button class="btn btn-outline-secondary" id="resetBtn"><i class="bi bi-arrow-counterclockwise me-1"></i>{{ t('reset_filters') }}</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Results Section -->
    <div id="resultsSection" style="display:none;" class="mb-3">
        <div class="d-flex justify-content-between align-items-center">
            <h5 id="resultsTitle" class="fw-bold"></h5>
            <small id="resultCount" class="text-muted"></small>
        </div>
    </div>

    <!-- Medications Container -->
    <div class="row" id="medicationsContainer">
        <div class="col-12 text-center py-5">
            <div class="spinner-border text-muted" role="status"><span class="visually-hidden">{{ t('loading_text') }}</span></div>
        </div>
    </div>

    <!-- Pagination -->
    <nav id="pagination" style="display:none;">
        <ul class="pagination justify-content-center"></ul>
    </nav>

    <!-- Medication Detail Modal -->
    <div class="modal fade" id="medicationModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-scrollable">
            <div class="modal-content" style="background: var(--bg-card); color: var(--text-primary); border: 1px solid var(--border-color);">
                <div class="modal-header" style="border-bottom-color: var(--border-color);">
                    <h5 class="modal-title fw-bold" id="modalTitle"></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="modalBody"></div>
                <div class="modal-footer" style="border-top-color: var(--border-color);">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">{{ t('close_btn') }}</button>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
.med-card { cursor: pointer; }
.med-badge { display: inline-block; padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.75rem; font-weight: 600; margin-right: 0.3rem; }
.otc-badge { background: rgba(34,197,94,0.1); color: var(--success-color); border: 1px solid rgba(34,197,94,0.3); }
.rx-badge { background: rgba(239,68,68,0.1); color: var(--danger-color); border: 1px solid rgba(239,68,68,0.3); }
.med-price { color: var(--accent); font-weight: 700; font-size: 0.95rem; }
.pharmacy-row td { font-size: 0.9rem; }
.table-responsive { background: var(--bg-card); border-radius: 6px; }
.table {
    color: var(--text-primary);
    background: var(--bg-card);
    margin-bottom: 0;
}
.table th {
    color: var(--text-secondary);
    border-color: var(--border-color);
    background: var(--bg-card-hover);
    font-weight: 600;
}
.table td {
    border-color: var(--border-color);
    background: var(--bg-card);
    color: var(--text-primary);
}
.table tbody tr:hover td {
    background: var(--bg-card-hover);
}
.page-link { background: var(--bg-card); color: var(--text-primary); border-color: var(--border-color); }
.page-item.active .page-link { background: var(--accent); border-color: var(--accent); color: #fff; }
.page-link:hover { background: var(--accent-bg); color: var(--accent); }
.badge-24h { background: rgba(109,185,166,0.15); color: var(--accent); border: 1px solid rgba(109,185,166,0.3); font-weight: 600; font-size: 0.7rem; }
.badge-delivery { background: rgba(34,197,94,0.1); color: var(--success-color); border: 1px solid rgba(34,197,94,0.3); font-weight: 600; font-size: 0.7rem; }
.med-details-toggle { cursor: pointer; color: var(--accent); font-weight: 600; font-size: 0.9rem; display: inline-flex; align-items: center; gap: 0.3rem; }
.med-details-toggle:hover { text-decoration: underline; }
.med-details-content { display: none; padding-top: 1rem; }
.med-details-content.show { display: block; }
.pharmacy-info-cell { line-height: 1.3; }
.pharmacy-info-cell .pharm-name { font-weight: 600; font-size: 0.9rem; }
.pharmacy-info-cell .pharm-address { font-size: 0.8rem; color: var(--text-secondary); }
.pharmacy-info-cell .pharm-phone { font-size: 0.8rem; color: var(--text-muted); }
</style>

<script>
const T = {
    view_details: {{ t('view_details')|tojson }},
    generic_name: {{ t('generic_name')|tojson }},
    category_label: {{ t('category_label')|tojson }},
    description_label: {{ t('description_label')|tojson }},
    active_ingredient: {{ t('active_ingredient')|tojson }},
    manufacturer: {{ t('manufacturer')|tojson }},
    dosage_forms: {{ t('dosage_forms')|tojson }},
    strengths: {{ t('strengths')|tojson }},
    type_label: {{ t('type_label')|tojson }},
    side_effects: {{ t('side_effects')|tojson }},
    contraindications: {{ t('contraindications')|tojson }},
    storage: {{ t('storage')|tojson }},
    pharmacy_name: {{ t('pharmacy_name')|tojson }},
    city_label: {{ t('city_label')|tojson }},
    qty_label: {{ t('qty_label')|tojson }},
    price: {{ t('price')|tojson }},
    no_pharmacy_data: {{ t('no_pharmacy_data')|tojson }},
    no_meds_found: {{ t('no_meds_found')|tojson }},
    all_meds_title: {{ t('all_meds_title')|tojson }},
    found_label: {{ t('found_label')|tojson }},
    no_description: {{ t('no_description')|tojson }},
    pharmacies_label: {{ t('pharmacies_label')|tojson }},
    error_loading: {{ t('error_loading')|tojson }},
    price_from: {{ t('price_from')|tojson }},
    address_label: {{ t('address_label')|tojson }},
    phone_label: {{ t('phone_label')|tojson }},
    working_hours: {{ t('working_hours')|tojson }},
    open_24_7: {{ t('open_24_7')|tojson }},
    delivery_badge: {{ t('delivery_badge')|tojson }},
    med_info_section: {{ t('med_info_section')|tojson }},
    available_at_n: {{ t('available_at_n')|tojson }},
    results_for: {{ t('results_for')|tojson }},
    letter_heading: {{ t('letter_heading')|tojson }},
    otc_label: {{ t('otc_label')|tojson }},
    rx_label: {{ t('rx_label')|tojson }},
    show_details: {{ t('show_details')|tojson }},
    hide_details: {{ t('hide_details')|tojson }},
    none_listed: {{ t('none_listed')|tojson }},
};

let medicationModal;
let currentPage = 1;

function esc(str) {
    if (!str) return '';
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
}

function getFilters() {
    return {
        q: document.getElementById('searchInput').value.trim(),
        city: document.getElementById('cityFilter').value,
        category_id: document.getElementById('categoryFilter').value,
        pharmacy_id: document.getElementById('pharmacyFilter').value,
    };
}

function applyFilters() {
    currentPage = 1;
    loadMedications();
}

function resetFilters() {
    document.getElementById('searchInput').value = '';
    document.getElementById('cityFilter').value = '';
    document.getElementById('categoryFilter').value = '';
    document.getElementById('pharmacyFilter').value = '';
    currentPage = 1;
    loadMedications();
}

async function loadMedications() {
    const container = document.getElementById('medicationsContainer');
    container.innerHTML = '<div class="col-12 text-center py-5"><div class="spinner-border text-muted" role="status"></div></div>';

    try {
        const filters = getFilters();
        const params = new URLSearchParams({ page: currentPage });
        if (filters.q) params.set('q', filters.q);
        if (filters.city) params.set('city', filters.city);
        if (filters.category_id) params.set('category_id', filters.category_id);
        if (filters.pharmacy_id) params.set('pharmacy_id', filters.pharmacy_id);

        const response = await fetch(`/api/medications?${params}`);
        const data = await response.json();

        if (!response.ok || !(data.medications || []).length) {
            container.innerHTML = `<div class="col-12"><div class="alert alert-info">${T.no_meds_found}</div></div>`;
            document.getElementById('resultsSection').style.display = 'none';
            document.getElementById('pagination').style.display = 'none';
            return;
        }

        const medications = data.medications;
        const total = data.total || data.count || medications.length;
        const resultsSection = document.getElementById('resultsSection');
        const resultsTitle = document.getElementById('resultsTitle');
        const resultCount = document.getElementById('resultCount');

        if (filters.q) {
            resultsTitle.innerHTML = `${T.results_for} "<strong class="text-accent">${esc(filters.q)}</strong>"`;
        } else {
            resultsTitle.textContent = T.all_meds_title;
        }
        resultCount.textContent = `${total} ${T.found_label}`;
        resultsSection.style.display = 'block';

        container.innerHTML = medications.map(med => `
            <div class="col-md-6 col-lg-4 mb-4">
                <div class="card med-card h-100" data-med-id="${med.id}">
                    <div class="card-body">
                        <h6 class="fw-bold mb-1">${esc(med.name)}</h6>
                        ${med.generic_name ? `<p class="small text-muted mb-2"><em>${esc(med.generic_name)}</em></p>` : ''}
                        <div class="mb-2">
                            ${med.is_otc ? `<span class="med-badge otc-badge">${T.otc_label}</span>` : ''}
                            ${med.requires_prescription ? `<span class="med-badge rx-badge">${T.rx_label}</span>` : ''}
                            ${med.category ? `<span class="med-badge" style="background:var(--accent-bg);color:var(--text-secondary);border:1px solid var(--border-color);">${esc(med.category)}</span>` : ''}
                        </div>
                        <p class="small text-muted mb-2">${med.description ? esc(med.description).substring(0, 100) + '...' : T.no_description}</p>
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <span class="small text-accent">${med.pharmacy_count || 0} ${T.pharmacies_label}</span>
                            ${med.min_price ? `<span class="med-price">${T.price_from} ${Math.round(med.min_price).toLocaleString()} ₸</span>` : ''}
                        </div>
                        <button class="btn btn-primary btn-sm w-100">${T.view_details}</button>
                    </div>
                </div>
            </div>
        `).join('');

        updatePagination(data);
    } catch (error) {
        console.error('Error:', error);
        container.innerHTML = `<div class="col-12"><div class="alert alert-danger">${T.error_loading}</div></div>`;
    }
}

async function showMedicationDetail(medId) {
    try {
        const response = await fetch(`/api/medications/${medId}`);
        const med = await response.json();
        document.getElementById('modalTitle').textContent = med.name;

        const selectedCity = document.getElementById('cityFilter').value;

        let html = `<div class="mb-3">`;
        if (med.generic_name) html += `<p class="text-muted mb-1"><em>${esc(med.generic_name)}</em></p>`;
        html += `<div>`;
        if (med.is_otc) html += `<span class="med-badge otc-badge">${T.otc_label}</span>`;
        if (med.requires_prescription) html += `<span class="med-badge rx-badge">${T.rx_label}</span>`;
        if (med.category) html += `<span class="med-badge" style="background:var(--accent-bg);color:var(--text-secondary);border:1px solid var(--border-color);">${esc(med.category)}</span>`;
        html += `</div></div>`;

        let pharmacies = med.pharmacies || [];
        if (selectedCity) {
            pharmacies = pharmacies.filter(p => p.city === selectedCity);
        }

        if (pharmacies.length > 0) {
            html += `<h6 class="fw-bold mb-2" style="color: var(--accent);">${T.available_at_n} ${pharmacies.length} ${T.pharmacies_label}</h6>`;
            html += `<div class="table-responsive mb-3"><table class="table table-sm align-middle"><thead><tr>`;
            html += `<th>${T.pharmacy_name}</th><th>${T.working_hours}</th><th class="text-end">${T.price}</th><th class="text-end">${T.qty_label}</th>`;
            html += `</tr></thead><tbody>`;

            pharmacies.forEach(p => {
                const hours = p.operates_24_7
                    ? `<span class="badge badge-24h">${T.open_24_7}</span>`
                    : (p.opening_time && p.closing_time ? `${esc(p.opening_time)}-${esc(p.closing_time)}` : '—');
                const deliveryBadge = p.delivery_available ? `<span class="badge badge-delivery ms-1">${T.delivery_badge}</span>` : '';

                html += `<tr>
                    <td class="pharmacy-info-cell">
                        <div class="pharm-name">${esc(p.pharmacy_name)}${deliveryBadge}</div>
                        <div class="pharm-address">${esc(p.address) || ''}</div>
                        ${p.phone ? `<div class="pharm-phone">${esc(p.phone)}</div>` : ''}
                    </td>
                    <td>${hours}</td>
                    <td class="text-end fw-bold">${p.price ? p.price.toLocaleString() + ' ₸' : '—'}</td>
                    <td class="text-end">${p.quantity}</td>
                </tr>`;
            });
            html += `</tbody></table></div>`;
        } else {
            html += `<div class="alert alert-info">${T.no_pharmacy_data}</div>`;
        }

        html += `<div class="border-top pt-3">`;
        html += `<span class="med-details-toggle" onclick="this.nextElementSibling.classList.toggle('show'); this.querySelector('.toggle-text').textContent = this.nextElementSibling.classList.contains('show') ? T.hide_details : T.show_details;">`;
        html += `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>`;
        html += `<span class="toggle-text">${T.show_details}</span></span>`;
        html += `<div class="med-details-content">`;

        const fields = [
            { label: T.description_label, value: med.description },
            { label: T.active_ingredient, value: med.active_ingredient },
            { label: T.manufacturer, value: med.manufacturer },
            { label: T.dosage_forms, value: med.dosage_forms },
            { label: T.strengths, value: med.available_strengths },
            { label: T.side_effects, value: med.side_effects },
            { label: T.contraindications, value: med.contraindications },
            { label: T.storage, value: med.storage_instructions },
        ];

        fields.forEach(f => {
            html += `<div class="mb-2"><small class="text-muted d-block">${f.label}</small><span class="small">${esc(f.value) || T.none_listed}</span></div>`;
        });

        html += `</div></div>`;

        document.getElementById('modalBody').innerHTML = html;
        medicationModal.show();
    } catch (error) {
        console.error('Error:', error);
    }
}

function updatePagination(data) {
    const pagination = document.getElementById('pagination');
    const ul = pagination.querySelector('ul');
    if (!data.pages || data.pages <= 1) { pagination.style.display = 'none'; return; }
    pagination.style.display = 'block';
    ul.innerHTML = '';
    const page = data.page, total = data.pages;
    ul.appendChild(mkPage('&laquo;', page > 1, page - 1));
    getPages(page, total).forEach(p => {
        if (p === '...') { const li = document.createElement('li'); li.className = 'page-item disabled'; li.innerHTML = '<span class="page-link">...</span>'; ul.appendChild(li); }
        else ul.appendChild(mkPage(p, true, p, p === page));
    });
    ul.appendChild(mkPage('&raquo;', page < total, page + 1));
}
function mkPage(label, enabled, target, active) {
    const li = document.createElement('li');
    li.className = 'page-item' + (!enabled ? ' disabled' : '') + (active ? ' active' : '');
    const a = document.createElement('a');
    a.className = 'page-link'; a.href = '#'; a.innerHTML = label;
    if (enabled && !active) a.addEventListener('click', e => { e.preventDefault(); currentPage = target; loadMedications(); window.scrollTo({top:0,behavior:'smooth'}); });
    else a.addEventListener('click', e => e.preventDefault());
    li.appendChild(a); return li;
}
function getPages(c, t) {
    if (t <= 7) return Array.from({length:t},(_,i)=>i+1);
    const p = [1]; if (c>3) p.push('...');
    for (let i=Math.max(2,c-1); i<=Math.min(t-1,c+1); i++) p.push(i);
    if (c<t-2) p.push('...'); p.push(t); return p;
}

document.addEventListener('DOMContentLoaded', function() {
    medicationModal = new bootstrap.Modal(document.getElementById('medicationModal'));
    document.getElementById('searchBtn').addEventListener('click', applyFilters);
    document.getElementById('resetBtn').addEventListener('click', resetFilters);
    document.getElementById('searchInput').addEventListener('keypress', e => { if (e.key === 'Enter') applyFilters(); });
    document.getElementById('medicationsContainer').addEventListener('click', function(e) {
        const card = e.target.closest('.med-card');
        if (card) showMedicationDetail(card.dataset.medId);
    });
    loadMedications();
});
</script>
{% endblock %}
