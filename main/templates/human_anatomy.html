{% extends "base.html" %}

{% block title %}<span data-translate="human_anatomy">Human Anatomy</span> - ShipAI{% endblock %}

{% block content %}
<div class="container container-normal">
    <div class="page-header">
        <h1 data-translate="human_anatomy">Human Anatomy</h1>
        <p class="lead text-muted" data-translate="anatomy_subtitle">Interactive human body with detailed organ and system information</p>
    </div>

    <!-- Gender Selection -->
    <div class="row mb-4">
        <div class="col-md-12">
            <div class="card shadow-sm">
                <div class="card-body">
                    <label for="genderSwitch" class="form-label" style="color: var(--secondary-navy); font-weight: 600;" data-translate="select_gender">Select Gender:</label>
                    <div class="btn-group" role="group">
                        <input type="radio" class="btn-check" name="gender" id="maleOption" value="male" checked>
                        <label class="btn btn-outline-primary" for="maleOption" data-translate="male">Male</label>
                        
                        <input type="radio" class="btn-check" name="gender" id="femaleOption" value="female">
                        <label class="btn btn-outline-primary" for="femaleOption" data-translate="female">Female</label>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Anatomy Viewer -->
    <div class="row">
        <!-- Body Display -->
        <div class="col-md-6 mb-4">
            <div class="card shadow-sm" style="height: 600px; display: flex; align-items: center; justify-content: center;">
                <div style="text-align: center; width: 100%;">
                    <svg id="bodyModel" viewBox="0 0 200 500" style="max-width: 300px; height: auto;">
                        <!-- Head -->
                        <circle id="head" cx="100" cy="60" r="35" fill="#d4a574" stroke="var(--secondary-navy)" stroke-width="2" style="cursor: pointer;"/>
                        <!-- Body -->
                        <rect id="torso" x="80" y="100" width="40" height="80" rx="5" fill="#e8b4a8" stroke="var(--secondary-navy)" stroke-width="2" style="cursor: pointer;"/>
                        <!-- Heart -->
                        <circle id="heart" cx="100" cy="130" r="8" fill="#dc3545" style="cursor: pointer;"/>
                        <!-- Lungs -->
                        <ellipse id="lungs-left" cx="85" cy="140" rx="6" ry="12" fill="#87CEEB" style="cursor: pointer;"/>
                        <ellipse id="lungs-right" cx="115" cy="140" rx="6" ry="12" fill="#87CEEB" style="cursor: pointer;"/>
                        <!-- Stomach -->
                        <ellipse id="stomach" cx="100" cy="165" rx="8" ry="12" fill="#FFB6C1" style="cursor: pointer;"/>
                        <!-- Liver -->
                        <ellipse id="liver" cx="115" cy="155" rx="6" ry="10" fill="#8B4513" style="cursor: pointer;"/>
                        <!-- Arms -->
                        <rect id="arm-left" x="40" y="110" width="40" height="15" rx="7" fill="#e8b4a8" stroke="var(--secondary-navy)" stroke-width="2" style="cursor: pointer;"/>
                        <rect id="arm-right" x="120" y="110" width="40" height="15" rx="7" fill="#e8b4a8" stroke="var(--secondary-navy)" stroke-width="2" style="cursor: pointer;"/>
                        <!-- Legs -->
                        <rect id="leg-left" x="85" y="185" width="12" height="80" rx="6" fill="#e8b4a8" stroke="var(--secondary-navy)" stroke-width="2" style="cursor: pointer;"/>
                        <rect id="leg-right" x="103" y="185" width="12" height="80" rx="6" fill="#e8b4a8" stroke="var(--secondary-navy)" stroke-width="2" style="cursor: pointer;"/>
                        <!-- Brain -->
                        <circle id="brain" cx="100" cy="40" r="6" fill="#FFD700" style="cursor: pointer;"/>
                    </svg>
                </div>
            </div>
        </div>

        <!-- Information Panel -->
        <div class="col-md-6 mb-4">
            <div class="card shadow-sm" style="height: 600px; overflow-y: auto;">
                <div class="card-body">
                    <h5 class="card-title" id="organ-title" style="color: var(--secondary-navy); font-weight: 600;" data-translate="anatomy_default_title">Click on body parts</h5>
                    <hr>
                    <p id="organ-info" class="text-muted" data-translate="anatomy_default_info">
                        Select any body part to view detailed information about that organ or system.
                    </p>
                    <div id="organ-details" style="margin-top: 1.5rem;">
                        <!-- Details will be populated here -->
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const organInfo = {
        'head': {
            title: 'Head & Brain',
            info: 'The head contains the brain and sensory organs including eyes, ears, and nose.',
            details: 'The brain controls all bodily functions and processes information from the environment.'
        },
        'brain': {
            title: 'Brain',
            info: 'Central control center of the nervous system.',
            details: 'Responsible for thinking, memory, coordination, and controlling all body functions.'
        },
        'torso': {
            title: 'Torso',
            info: 'Contains vital organs including the heart, lungs, liver, and digestive organs.',
            details: 'The main body cavity housing the majority of internal organs.'
        },
        'heart': {
            title: 'Heart',
            info: 'Pumps blood throughout the body',
            details: 'A muscular organ about the size of a fist that beats approximately 100,000 times per day.'
        },
        'lungs-left': {
            title: 'Left Lung',
            info: 'Responsible for oxygen exchange',
            details: 'Slightly smaller than the right lung to make room for the heart.'
        },
        'lungs-right': {
            title: 'Right Lung',
            info: 'Responsible for oxygen exchange',
            details: 'Larger than the left lung, has three lobes compared to the left\'s two.'
        },
        'stomach': {
            title: 'Stomach',
            info: 'Digests food using acids and enzymes',
            details: 'Mixes food with gastric juices for digestion. Food stays in stomach for 1-2 hours.'
        },
        'liver': {
            title: 'Liver',
            info: 'Filters blood and produces bile',
            details: 'The largest internal organ, detoxifies chemicals and maintains metabolic processes.'
        },
        'arm-left': {
            title: 'Left Arm',
            info: 'Contains bones, muscles, and blood vessels',
            details: 'Composed of the shoulder, forearm, and hand with complex movement capabilities.'
        },
        'arm-right': {
            title: 'Right Arm',
            info: 'Contains bones, muscles, and blood vessels',
            details: 'Composed of the shoulder, forearm, and hand with complex movement capabilities.'
        },
        'leg-left': {
            title: 'Left Leg',
            info: 'Supports body weight and enables movement',
            details: 'Contains the thigh, calf, and foot with multiple joints for flexibility.'
        },
        'leg-right': {
            title: 'Right Leg',
            info: 'Supports body weight and enables movement',
            details: 'Contains the thigh, calf, and foot with multiple joints for flexibility.'
        }
    };

    Object.keys(organInfo).forEach(organId => {
        const element = document.getElementById(organId);
        if (element) {
            element.addEventListener('click', function() {
                const info = organInfo[organId];
                document.getElementById('organ-title').textContent = info.title;
                document.getElementById('organ-info').textContent = info.info;
                document.getElementById('organ-details').innerHTML = `
                    <div style="background-color: #F5FCF8; padding: 1rem; border-radius: 6px; border-left: 3px solid var(--primary-green);">
                        <p>${info.details}</p>
                    </div>
                `;
            });
        }
    });

    // Gender toggle functionality
    const genderOptions = document.querySelectorAll('input[name="gender"]');
    genderOptions.forEach(option => {
        option.addEventListener('change', function() {
            // This could be used to display different body types
            console.log('Gender selected:', this.value);
        });
    });
});
</script>
{% endblock %}
