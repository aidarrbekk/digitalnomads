{% extends "base.html" %}

{% block title %}Resend Confirmation - ShipAI{% endblock %}

{% block content %}
<div class="auth-card fade-in">
    <div class="card">
        <div class="card-body p-5">
            <div class="text-center mb-4">
                <div class="auth-icon">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                </div>
                <h2 class="fw-bold mb-1">{{ t('resend_title') }}</h2>
                <p class="text-muted">{{ t('resend_desc') }}</p>
            </div>

            <form method="POST" novalidate>
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" name="email" required>
                </div>

                <div class="d-grid mb-3">
                    <button type="submit" class="btn btn-primary btn-lg">{{ t('send') }}</button>
                </div>
            </form>

            <hr class="my-4">
            <p class="text-center small text-muted">
                {{ t('remember_pw') }}
                <a href="{{ url_for('auth.login') }}">{{ t('login_link') }}</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
